<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Esports Betting UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:#0b0f1a;
color:white;
}

/* HEADER */

header{
height:70px;
background:#111728;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #1c2438;
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
}

.wallet{
background:#1b2438;
padding:8px 16px;
border-radius:8px;
font-size:14px;
}

/* SPORTS */

.sports{
display:flex;
gap:25px;
padding:12px 30px;
border-bottom:1px solid #1c2438;
background:#0f1423;
opacity:.9;
}

.sports span{
opacity:.6;
cursor:pointer;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 110px);
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

/* MATCH */

.match-card{
background:#12192c;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

.match-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.match-title{
font-size:18px;
opacity:.8;
}

.live{
background:#ff3b3b;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
font-weight:600;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.5}
100%{opacity:1}
}

.scoreboard{
display:flex;
justify-content:center;
gap:30px;
font-size:22px;
font-weight:600;
margin-bottom:15px;
}

.team-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #1c2438;
}

.team-row:last-child{
border:none;
}

.team{
display:flex;
align-items:center;
gap:10px;
}

.odds{
background:#1b2438;
padding:6px 16px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.odds:hover{
background:#3fa7ff;
}

/* TABS */

.tabs{
display:flex;
gap:15px;
margin:20px 0;
}

.tab{
background:#1b2438;
padding:8px 14px;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

/* TIPS */

.tips{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.tip{
background:#12192c;
padding:16px;
border-radius:10px;
font-size:13px;
opacity:.9;
}

/* MARKETS */

.market{
background:#12192c;
border-radius:12px;
padding:20px;
}

.market-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #1c2438;
}

.market-row:last-child{
border:none;
}

.market-buttons{
display:flex;
gap:10px;
}

.market-buttons button{
background:#1b2438;
border:none;
color:white;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.market-buttons button:hover{
background:#3fa7ff;
}

/* BETSLIP */

.betslip{
width:330px;
background:#111728;
border-left:1px solid #1c2438;
padding:20px;
display:flex;
flex-direction:column;
}

.bet{
background:#1b2438;
padding:12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

input{
background:#0b0f1a;
border:1px solid #1c2438;
padding:10px;
color:white;
border-radius:6px;
margin-top:10px;
}

button.place{
margin-top:15px;
padding:12px;
border:none;
background:#3fa7ff;
color:white;
font-weight:600;
border-radius:8px;
cursor:pointer;
}

.win{
margin-top:10px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<header>

<div class="logo">Miteoryte</div>

<div class="wallet">$0.00 Кошелек</div>

</header>

<div class="sports">

<span>⚽</span>
<span>🏀</span>
<span>🎮</span>
<span>🎾</span>
<span>🏈</span>
<span>🏐</span>

</div>

<div class="container">

<div class="main">

<div class="match-card">

<div class="match-header">

<div class="match-title">
Counter-Strike 2 • BLAST Open Spring 2026
</div>

<div class="live" id="liveIndicator">
LIVE
</div>

</div>

<div class="scoreboard">

<div id="team1Score">0</div>

<div>:</div>

<div id="team2Score">0</div>

</div>

<div class="team-row">

<div class="team" id="team1Name">
Team Falcons
</div>

<div class="odds" onclick="addBet('Team Falcons',1.22)">
1.22
</div>

</div>

<div class="team-row">

<div class="team" id="team2Name">
NRG Esports
</div>

<div class="odds" onclick="addBet('NRG Esports',3.85)">
3.85
</div>

</div>

</div>

<div class="tips">

<div class="tip">Falcons выиграли прошлый BO3 2-1</div>
<div class="tip">Falcons вели 11-1 на карте</div>
<div class="tip">Последний матч 13-5</div>

</div>

</div>

<div class="betslip">

<div id="bets"></div>

<input id="stake" placeholder="Сумма ставки">

<div class="win" id="win">
Возможный выигрыш: $0
</div>

<button class="place">Поставить</button>

</div>

</div>

<script>

let odds = 0

function addBet(name,value){

odds = value

document.getElementById("bets").innerHTML = 
`<div class="bet">
${name}<br>
коэффициент ${value}
</div>`
}

document.getElementById("stake").addEventListener("input",function(){

let stake = this.value
let win = stake * odds

document.getElementById("win").innerText =
"Возможный выигрыш: $" + win.toFixed(2)

})

/* ------------------------
LIVE SCORE UPDATE
------------------------ */

function updateScore(data){

document.getElementById("team1Name").innerText = data.team1
document.getElementById("team2Name").innerText = data.team2

document.getElementById("team1Score").innerText = data.score1
document.getElementById("team2Score").innerText = data.score2

}

/* пример обновления (эмуляция API) */

setTimeout(()=>{

updateScore({
team1:"Team Falcons",
team2:"NRG Esports",
score1:1,
score2:0
})

},2000)

</script>

</body>
</html>
