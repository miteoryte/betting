<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting App</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #fff;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 15px;
  }

  .match-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  }

  .teams {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
  }

  .team-logo {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    background: #444;
  }

  .odds {
    display: flex;
    gap: 15px;
    margin-top: 15px;
  }

  .odds div {
    background: #22223b;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .odds div:hover {
    background: #ff5500;
    color: #fff;
  }

  .header {
    text-align: center;
    font-size: 16px;
    color: #aaa;
    margin-bottom: 15px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="match-card">
    <div class="header">Counter-Strike 2 • BLAST Open Spring 2026 • Завтра, 12:00</div>

    <div class="teams">
      <div class="team">
        <div class="team-logo" style="background:#4ade80"></div>
        Team Falcons
      </div>
      <div class="team">VS</div>
      <div class="team">
        <div class="team-logo" style="background:#f87171"></div>
        NRG Esports
      </div>
    </div>

    <div class="odds">
      <div>Team Falcons: 1.22</div>
      <div>NRG Esports: 3.85</div>
      <div>Фора Team Falcons (-4.5): 1.81</div>
      <div>Тотал больше 20.5: 1.83</div>
    </div>
  </div>
</div>

</body>
</html>
